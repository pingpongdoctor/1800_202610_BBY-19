<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme" rel="stylesheet" type="text/css" href="/css/default.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- Other libraries go here -->
    <script type="module" src="/src/components/site-footer.js"></script>

</head>

<body>

    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>
    <!-- Stuff for body goes here -->

    <img src="/images/hike2.jpg" alt="banner" class="img-fluid  mx-auto rounded d-block">

    <br>

    <div class="container-fluid text-center ">
        <h1>Welcome <span id="name-goes-here"></span></h1>
        <hr>
    </div>

    <!-- ITEM SHOWCASE? -->
    <div class="card" style="margin-left: 20%; margin-right: 20%;">
        <div class="card-header">
            Item Showcase
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">Item 1: <span id="item-showcase-1"></span></li>
            <li class="list-group-item">Item 2: <span id="item-showcase-2"></span></li>
            <li class="list-group-item">Item 3: <span id="item-showcase-3"></span></li>
        </ul>
    </div>

    <br>

    <!-- FRIENDS LIST? -->
    <div class="card" style="margin-left: 20%; margin-right: 20%;">
        <div class="card-header">
            Friends
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">Item 1: <span id="friend-1"></span></li>
            <li class="list-group-item">Item 2: <span id="friend-2"></span></li>
            <li class="list-group-item">Item 3: <span id="friend-3"></span></li>
        </ul>
    </div>

    <br>

    <!-- THEME SWITCH -->
    <div id="themeSwitcher">
        <button class="btn btn-outline-light mx-auto" id="default" type="button">Default</button>
        <button class="btn btn-outline-light mx-auto" id="test" type="button">Test</button>
    </div>


    <br>

    <select class="form-select" aria-label="Default select example">
        <option selected>Open this select menu</option>
        <option value="1">One</option>
        <option value="2">Two</option>
        <option value="3">Three</option>
    </select>

    <br>


    <!-- LOGOUT BUTTON -->
    <div id="logoutGoesHere"><button class="btn btn-outline-light mx-auto d-block" id="logoutBtn" type="button"
            style="min-width: 80px;">Log out</button></div>

    <br><br><br>

    <!-- NAV BAR -->
    <site-footer></site-footer>



    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/profile.js"></script>
    <script type="module" src="/src/customization.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script type="module" src="/src/stepCounting.js"></script>
</body>

</html>
