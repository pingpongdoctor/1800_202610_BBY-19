<!DOCTYPE html>
<html lang="en">

<head>
    <title>Guide19</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme" rel="stylesheet" type="text/css" href="/css/defaultTheme.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- Other libraries go here -->
    <script type="module" src="/src/components/site-footer.js"></script>
    <script type="module" src="../../src/stepCounting.js"></script>
</head>

<body>



    <!-- CHALLENGES BOARD -->
    <div id="challengesContainer">
        <div class="card">
            <div class="card-header">
                <h2>Weekly Challenges</h2>
                <p class="card-text"><small class="text-body-secondary">Complete these challenges!</small></p>
            </div>

            <ul class="list-group list-group-flush" id="challengeList">

            </ul>
        </div>
    </div>



    <template id="challengeItem">
        <li class="list-group-item">
            <p class="challenge-title">Loading...</p>
            <div class="progress" role="progressbar" aria-label="Success example" aria-valuemin="0" aria-valuemax="0"
                aria-valuenow="0" style="height: 30px; margin-left: 5%; margin-right: 5%;">
                <div class="progress-bar text-bg-success"></div>
            </div>
            <br>
        </li>
    </template>

    <!-- NAV BAR -->
    <site-footer></site-footer>



    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <script type="module" src="/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script type="module" src="/src/challenges.js"></script>
</body>

</html>
