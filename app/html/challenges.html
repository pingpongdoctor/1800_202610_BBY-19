<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- Other libraries go here -->
    <script type="module" src="/src/components/site-footer.js"></script>
    <script type="module" src="/src/components/site-searchbar.js"></script>

</head>

<body>

    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>
    <!-- Stuff for body goes here -->

    <!-- SEARCH BAR -->
    <site-searchbar></site-searchbar>

    <br>

    <!-- DISTANCE TRAVELLED CARD -->
    <div class="card text-center mb-3" id="challenge_summary" style="width: 50%; margin-left: auto; margin-right: auto;">
        <div class="card-body">
            <p class="card-text">Distance Travelled (KM):</p>
            <h1 class="card-title">37</h1>
            <br>
            <p class="card-text">Steps:</p>
            <h1 class="card-title">1,369</h1>


        </div>
    </div>

    <br>

    <!-- CHALLENGES BOARD -->
    <div class="card" style="width: 50%; margin-left: auto; margin-right: auto;">
        <div class="card-header">
            <h5>Weekly Challenges</h5>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <p>Walk 10000 steps</p>
                <div class="progress" role="progressbar" aria-label="Success example" aria-valuenow="6700"
                    aria-valuemin="0" aria-valuemax="10000" style="height: 30px; margin-left: 5%; margin-right: 5%;">
                    <div class="progress-bar text-bg-success" style="width: 67%">6700 / 10000</div>
                </div>
                <br>
            </li>
            <li class="list-group-item">
                <p>Visit 5 restaurants</p>
                <div class="progress" role="progressbar" aria-label="Success example" aria-valuenow="2"
                    aria-valuemin="0" aria-valuemax="5" style="height: 30px; margin-left: 5%; margin-right: 5%;">
                    <div class="progress-bar text-bg-success" style="width: 40%">2 / 5</div>
                </div>
                <br>
            </li>
            <li class="list-group-item">
                <p>Visit 5 cafes</p>
                <div class="progress" role="progressbar" aria-label="Success example" aria-valuenow="4"
                    aria-valuemin="0" aria-valuemax="5" style="height: 30px; margin-left: 5%; margin-right: 5%;">
                    <div class="progress-bar text-bg-success" style="width: 80%">4 / 5</div>
                </div>
                <br>
            </li>

        </ul>
    </div>


    <br><br><br><br><br>

    <!-- NAV BAR -->
    <site-footer></site-footer>



    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/js/client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
