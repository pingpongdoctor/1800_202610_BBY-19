<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme" rel="stylesheet" type="text/css" href="/css/defaultTheme.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <!-- Other libraries go here -->
    <script type="module" src="/src/components/site-footer.js"></script>
    

</head>

<body>

    <!-- Redemption Modal -->
    <div class="modal fade" id="redeemModal" tabindex="-1" aria-labelledby="redeemModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="redeemModalLabel">Congratulations!</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>You have successfully redeemed this item!</p>
                    <p>Check it out in your profile page!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="errorModalLabel">Error!</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>You don't have enough points to redeem this!</p>
                    <p>Come back when you have enough!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div  id="shopPage">
        <!-- SHOP -->
        <div class="card">
            <div class="card-header">
                <h2>Shop</h2>
                <p class="card-text"><small class="text-body-secondary">You have: <b><span id="pointsGoHere"></span></b>
                        points</small></p>
            </div>
            <br>
            <div id="itemList"></div>
        </div>
    </div>



    <!-- NAV BAR -->
    <site-footer></site-footer>

    <!-- Item Template -->
    <template id="itemTemplate">
        <div class="card mb-3" style="margin-left: 3%; margin-right: 3%;">
            <div class="itemFlex">
                <div>
                    <div class="card-body">
                        <h4 class="card-title itemTitle">title</h4>
                        <p class="card-text itemDesc">description</p>
                        <p class="card-text"><small class="text-body-secondary">Points required: <b><span
                                        class="itemCost">cost</span></b></small></p>
                        <br>
                        <button type="button" class="btn btn-primary itemRedeem">Redeem</button>
                    </div>
                </div>
                <div>
                    <img src="/images/badge.png" alt="badge">
                </div>
            </div>
        </div>
    </template>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/itemShop.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="/src/stepCounting.js"></script>

</body>

</html>
