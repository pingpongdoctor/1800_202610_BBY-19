<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Bootstrap JS (needed for dropdowns, modals, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/styles.css">

    <!-- Other libraries go here -->
    <script type="module" src="/src/components/site-footer.js"></script>
    <script type="module" src="/src/components/site-searchbar.js"></script>
    <script type="module" src="/src/components/map.js"></script>
</head>

<body>

    <!-- SEARCH BAR -->
    <site-searchbar></site-searchbar>
    <!-- MAP -->
    <!-- <div class="hero d-flex justify-content-center align-items-center"></div> -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <!-- MODE SELECTOR + ROUTES TABLE (fixed to bottom) -->
    <div class="route-panel">
        <!-- MODE SELECTOR -->
        <div class="d-flex w-100">
            <button class="mode-btn active flex-fill d-flex flex-column align-items-center py-3 border-0" data-mode="walking">
                <img src="/images/walking.png" alt="walking" style="width: 35px;">
                <span class="mt-1 small">Walking</span>
            </button>
            <button class="mode-btn flex-fill d-flex flex-column align-items-center py-3 border-0" data-mode="cycling">
                <img src="/images/cycling.png" alt="cycling" style="width: 35px;">
                <span class="mt-1 small">Cycling</span>
            </button>
            <button class="mode-btn flex-fill d-flex flex-column align-items-center py-3 border-0" data-mode="transit">
                <img src="/images/transit.png" alt="transit" style="width: 35px;">
                <span class="mt-1 small">Transit</span>
            </button>
        </div>

        <!-- ROUTES TABLE -->
        <table class="table table-striped mb-0">
            <tbody>
                <tr>
                    <th class="route-odd" scope="row">Route 1</th>
                    <td class="route-odd route-time"></td>
                </tr>
                <tr>
                    <th class="route-even" scope="row">Route 2</th>
                    <td class="route-even route-time"></td>
                </tr>
                <tr>
                    <th class="route-odd" scope="row">Route 3</th>
                    <td class="route-odd route-time"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/routes.js"></script>
</body>

</html>
