<!DOCTYPE html>
<html lang="en">

<head>
    <title>Guide19</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme" rel="stylesheet" type="text/css" href="/css/defaultTheme.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- Other libraries go here -->
  <script type="module" crossorigin src="/assets/login-DYqijppF.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/main-C-snRr2U.js">
  <link rel="stylesheet" crossorigin href="/assets/main-DBkz-poX.css">
</head>

<body>

    <!-- LOGIN/SIGNUP -->
    <div id="loginContainer">
        <!-- Alerts -->
        <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

        <!-- Login -->
        <div id="loginView">
            <h3 class="mb-3 text-center">Login</h3>
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email" required />
                </div>
                <div class="mb-3">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <small class="d-block mt-3 text-center">
                Don’t have an account?
                <a href="#" id="toSignup">Sign up</a>
            </small>
        </div>

        <!-- Signup -->
        <div id="signupView" class="d-none">
            <h3 class="mb-3 text-center">Sign Up</h3>
            <form id="signupForm" novalidate>
                <div class="mb-3">
                    <input type="text" id="signupName" class="form-control" placeholder="First and Last Name"
                        aria-label="Full name" required />
                </div>
                <div class="mb-3">
                    <input type="email" id="signupEmail" class="form-control" placeholder="Email" required />
                </div>
                <div class="mb-3">
                    <input type="password" id="signupPassword" class="form-control" placeholder="Password" required />
                </div>
                <button type="submit" class="btn btn-success w-100">Create Account</button>
            </form>
            <small class="d-block mt-3 text-center">
                Already have an account?
                <a href="#" id="toLogin">Login</a>
            </small>
        </div>
    </div>

    <!-- NAV BAR -->
    <site-footer></site-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

</body>

</html>
