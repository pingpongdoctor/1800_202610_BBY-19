<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme" rel="stylesheet" type="text/css" href="/css/default.css" />

    <!-- Other libraries go here -->
    <script type="module" src="/src/components/site-footer.js"></script>
    <script type="module" src="/src/components/site-searchbar.js"></script>
    <script type="module" src="/src/components/map.js"></script>
    <script type="module" src="/src/locations.js"></script>
</head>

<body>

    <!-- SEARCH BAR -->
    <site-searchbar></site-searchbar>

    <!-- MAP -->
    <!-- <div class="hero d-flex justify-content-center align-items-center"></div> -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <!-- LOCATION DETAIL PANEL (slides in from the left like Google Maps) -->
    <div id="location-panel" class="location-panel">
        <button class="panel-close-btn" onclick="closeLocationPanel()">✕</button>
        <!-- Shows a custom image if the location has one in Firestore,
             otherwise falls back to a MapTiler static map thumbnail of the area -->
        <img id="panel-image" class="panel-image" src="" alt="Location preview" />
        <p id="panel-type" class="panel-type"></p>
        <h2 id="panel-name" class="panel-name"></h2>
        <p id="panel-description" class="panel-description"></p>
        <div class="panel-actions">
            <a id="panel-directions-btn" href="#" class="panel-btn panel-directions-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
                </svg>
                Directions
            </a>
            <!-- Save location (TODO: actual save location logic lol) -->
            <button class="panel-btn panel-save-btn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.777.416L8 13.101l-5.223 2.815A.5.5 0 0 1 2 15.5V2z"/>
                </svg>
                Save
            </button>
        </div>
    </div>

    <!-- NAV BAR -->
    <site-footer></site-footer>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
